services:
  # ========================================
  # FRONTEND - React + Vite
  # ========================================
  frontend:
    container_name: ecommerce-frontend
    build:
      context: ./electronic-e-commerce
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./electronic-e-commerce:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_BACKEND_API_URL=http://localhost:8000/api
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      - backend
    networks:
      - ecommerce-network

  # ========================================
  # BACKEND - Laravel PHP Application
  # ========================================
  backend:
    container_name: ecommerce-backend
    build:
      context: ./is-web-project
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./is-web-project:/var/www
    env_file:
      - ./.secrets.local.env
    environment:
      APP_NAME: esapp
      APP_ENV: local
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: esapp
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
    depends_on:
      - db
    networks:
      - ecommerce-network

  # ========================================
  # NGINX - Web Server for Laravel
  # ========================================
  nginx:
    container_name: ecommerce-nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./is-web-project:/var/www
      - ./is-web-project/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - ecommerce-network

  # ========================================
  # DATABASE - MySQL 8.0
  # ========================================
  db:
    container_name: ecommerce-db
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    env_file:
      - ./.secrets.local.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: esapp
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - ecommerce-network

# ========================================
# NETWORKS
# ========================================
networks:
  ecommerce-network:
    driver: bridge

# ========================================
# VOLUMES
# ========================================
volumes:
  dbdata:
    driver: local
