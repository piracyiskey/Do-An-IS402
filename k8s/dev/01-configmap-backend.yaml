apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: dev
data:
  APP_NAME: "esapp"
  APP_ENV: "development"
  APP_DEBUG: "true"
  APP_URL: "http://api.dev.local"
  CORS_ALLOWED_ORIGINS: "http://frontend.dev.local"

  LOG_CHANNEL: "stack"
  LOG_LEVEL: "debug"

  DB_CONNECTION: "mysql"
  DB_HOST: "esapp-mysql-dev.mysql.database.azure.com"
  DB_PORT: "3306"
  DB_DATABASE: "esapp"
  DB_USERNAME: "azureuser"

  CACHE_STORE: "redis"
  SESSION_DRIVER: "redis"
  QUEUE_CONNECTION: "database"

  REDIS_CLIENT: "phpredis"
  REDIS_HOST: "esapp-redis-dev.redis.cache.windows.net"
  REDIS_PORT: "6380"

  JWT_ALGO: "HS256"
  GOOGLE_CLIENT_ID: "your-google-client-id.apps.googleusercontent.com"
  GOOGLE_REDIRECT_URI: "http://frontend.dev.local/auth/callback"
