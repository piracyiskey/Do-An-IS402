version: '3.8'

services:
  frontend:
    container_name: electronic-ecommerce-dev
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge
